<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <style>
    :root {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #1f2937;
      background: #eef4f6;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: #eef4f6;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-shell {
      width: min(100%, 420px);
      background: #ffffff;
      border: 1px solid #d8dee3;
      border-radius: 24px;
      box-shadow: 0 14px 30px rgba(31, 41, 55, 0.08);
      padding: 36px 30px;
    }

    .login-shell h1 {
      margin: 0 0 10px;
      font-size: 2rem;
      color: #111827;
    }

    .login-shell p {
      margin: 0 0 24px;
      color: #52606d;
      line-height: 1.7;
    }

    .field-row {
      display: grid;
      gap: 16px;
      margin-bottom: 24px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #d1d5db;
      border-radius: 16px;
      background: #f4f6f8;
      color: #1f2937;
      font-size: 1rem;
    }

    input:focus {
      outline: none;
      border-color: #9ca3af;
      background: #ffffff;
    }

    button[type="submit"] {
      width: 100%;
      padding: 14px 16px;
      border: none;
      border-radius: 16px;
      background: #334155;
      color: #ffffff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, filter 0.18s ease;
    }

    button[type="submit"]:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    .signup-link {
      margin-top: 22px;
      text-align: center;
      color: #52606d;
      font-size: 0.95rem;
    }

    .signup-link a {
      color: #334155;
      font-weight: 700;
      text-decoration: none;
    }

    .signup-link a:hover {
      text-decoration: underline;
    }

    @media (max-width: 520px) {
      .login-shell {
        padding: 28px 22px;
      }
    }
  </style>
</head>
<body>
  <div class="login-shell">
    <h1>Create Account</h1>
    <p>Register to save orders and access your cart faster.</p>

    <form onsubmit="signup(event)">
      <div class="field-row">
        <input id="name" type="text" placeholder="Name" required>
        <input id="email" type="email" placeholder="Email Address" required>
        <input id="password" type="password" placeholder="Password" required>
      </div>
      <button type="submit">Sign Up</button>
    </form>

    <p class="signup-link">Already have an account? <a href="login.html">Login</a></p>
  </div>

  <script type="module" src="./js/auth.js"></script>
</body>
</html>
