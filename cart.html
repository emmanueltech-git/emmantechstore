<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart</title>
  <style>
    :root {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #1f2937;
      background: #eef4f6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #eef4f6;
      color: #1f2937;
    }

    a {
      color: #334155;
      text-decoration: none;
    }

    a:hover {
      color: #1f2937;
    }

    .page-header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 20px;
      background: #ffffff;
      border-bottom: 1px solid #d8dee3;
      box-shadow: 0 10px 24px rgba(31, 41, 55, 0.08);
    }

    .brand {
      font-size: 1.2rem;
      font-weight: 700;
      color: #111827;
    }

    .page-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .page-nav a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border-radius: 999px;
      background: #f4f5f7;
      border: 1px solid #d8dee3;
      color: #334155;
      font-weight: 600;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .page-nav a:hover {
      background: #e8edf0;
      color: #1f2937;
    }

    .main-content {
      max-width: 1040px;
      margin: 24px auto 40px;
      padding: 0 20px;
    }

    .page-title {
      margin: 0 0 12px;
      font-size: 2rem;
      line-height: 1.1;
    }

    .page-description {
      margin: 0 0 26px;
      color: #52606d;
      line-height: 1.7;
      max-width: 680px;
    }

    .cart-items {
      display: grid;
      gap: 18px;
    }

    .cart-card {
      display: grid;
      gap: 14px;
      padding: 20px;
      border-radius: 18px;
      background: #ffffff;
      border: 1px solid #d8dee3;
      box-shadow: 0 12px 24px rgba(31, 41, 55, 0.06);
    }

    .cart-card p {
      margin: 0;
      color: #52606d;
      line-height: 1.7;
    }

    .cart-card strong {
      color: #111827;
    }

    .cart-card .cart-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .cart-card button {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      background: #334155;
      color: #ffffff;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, filter 0.18s ease;
    }

    .cart-card button:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    #total {
      padding: 20px;
      margin-top: 24px;
      border-radius: 18px;
      background: #ffffff;
      border: 1px solid #d8dee3;
      box-shadow: 0 12px 24px rgba(31, 41, 55, 0.06);
      color: #111827;
      font-size: 1.05rem;
      font-weight: 700;
      text-align: center;
    }

    .place-order-btn {
      display: block;
      width: min(100%, 320px);
      margin: 28px auto 0;
      padding: 14px 18px;
      border: none;
      border-radius: 999px;
      background: #334155;
      color: #ffffff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, filter 0.18s ease;
    }

    .place-order-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    .empty-state {
      padding: 28px 24px;
      border-radius: 18px;
      background: #ffffff;
      border: 1px solid #d8dee3;
      text-align: center;
      box-shadow: 0 12px 24px rgba(31, 41, 55, 0.06);
      color: #52606d;
    }

    .empty-state h2 {
      margin: 0 0 12px;
      font-size: 1.5rem;
      color: #111827;
    }

    @media (max-width: 720px) {
      .page-header {
        padding: 16px 18px;
      }

      .main-content {
        padding: 0 14px;
      }
    }
  </style>
</head>
<body>
  <header class="page-header">
    <a class="brand" href="index.html">My Store</a>
    <nav class="page-nav">
      <a href="login.html">Login</a>
      <a href="register.html">Register</a>
      <a href="orders.html">Orders</a>
    </nav>
  </header>

  <main class="main-content">
    <h1 class="page-title">Your Cart</h1>
    <p class="page-description">Review the items you have added, remove unnecessary products, and place your order with a calm Checkout interface.</p>

    <div id="cart-items" class="cart-items"></div>
    <div id="total">Total: ₦0</div>
    <button class="place-order-btn" onclick="placeOrder()">Place Order</button>
  </main>

  <script type="module" src="./js/cart.js"></script>
  <script src="https://js.paystack.co/v1/inline.js"></script>
</body>
</html>
